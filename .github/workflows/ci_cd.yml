#  CI/CD Pipeline — Multilingual Hate & Misinfo Detector
#  Jay Modhiya | Krishna Nandi | SIT Pune
# ─────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:   ap-south-1
  ECR_REPO:     muril-hate-misinfo
  EC2_HOST:     ${{ secrets.EC2_HOST }}

jobs:

  # ── Job 1: Run Tests ──────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.40.0 datasets
          pip install pytest pyyaml pandas numpy==1.26.4 scikit-learn scipy
          pip install mlflow lime matplotlib seaborn

      - name: Run data tests
        run: pytest tests/test_data.py -v --tb=short

      - name: Run model tests
        run: pytest tests/test_model.py -v --tb=short

  # ── Job 2: Build & Push Docker Image ─────
  build:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPO:latest
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Push to ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Pushed: $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

  # ── Job 3: Deploy to EC2 ──────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS \
              --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/muril-hate-misinfo:latest
            docker stop muril-app 2>/dev/null || true
            docker rm   muril-app 2>/dev/null || true
            docker run -d \
              --name muril-app \
              --restart unless-stopped \
              -p 8501:8501 \
              ${{ steps.login-ecr.outputs.registry }}/muril-hate-misinfo:latest
            echo "Deployment complete ✓"
            docker ps | grep muril-app
